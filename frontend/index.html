<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Lab — AI-Powered Transfer Pricing Intelligence</title>
    <meta name="description" content="Search 2,200+ OECD Guidelines paragraphs with semantic AI. Get PhD-level analysis and expert research powered by Claude.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a1628;
            --bg-secondary: #111827;
            --bg-sidebar: #0d1117;
            --bg-card: #111827;
            --border: #1e293b;
            --border-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-amber: #f59e0b;
            --accent-amber-hover: #d97706;
            --accent-amber-glow: rgba(245, 158, 11, 0.15);
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --color-high: #22c55e;
            --color-med: #f59e0b;
            --color-low: #ef4444;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
            --transition: 0.2s ease;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent-amber); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Dot grid background */
        .dot-grid {
            background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .fade-in { animation: fadeIn 0.4s ease forwards; }
        .fade-in-up { animation: fadeInUp 0.5s ease forwards; }

        /* ========== BUTTONS ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            white-space: nowrap;
        }
        .btn-amber {
            background: var(--accent-amber);
            color: #0a1628;
        }
        .btn-amber:hover {
            background: var(--accent-amber-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
        }
        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-outline:hover {
            border-color: var(--accent-amber);
            color: var(--accent-amber);
        }
        .btn-blue {
            background: var(--accent-blue);
            color: white;
        }
        .btn-blue:hover {
            background: var(--accent-blue-hover);
            transform: translateY(-1px);
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }
        .btn-lg {
            padding: 16px 32px;
            font-size: 16px;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ========== INPUTS ========== */
        .input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: border-color var(--transition);
        }
        .input:focus {
            outline: none;
            border-color: var(--accent-amber);
            box-shadow: 0 0 0 3px var(--accent-amber-glow);
        }
        .input::placeholder { color: var(--text-muted); }

        textarea.input {
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }

        /* ========== CARDS ========== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all var(--transition);
        }
        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        /* ========== LANDING PAGE ========== */
        .landing-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 48px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 22, 40, 0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .landing-logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .landing-logo span { color: var(--accent-amber); }
        .landing-nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .landing-nav-links a {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: color var(--transition);
        }
        .landing-nav-links a:hover { color: var(--text-primary); text-decoration: none; }

        .hero {
            padding: 100px 48px 80px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .hero-badge {
            display: inline-block;
            padding: 6px 16px;
            background: var(--accent-amber-glow);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent-amber);
            margin-bottom: 24px;
        }
        .hero h1 {
            font-size: 52px;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -1.5px;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero h1 em {
            font-style: normal;
            background: linear-gradient(135deg, var(--accent-amber) 0%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-sub {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 700px;
            margin: 0 auto 40px;
        }
        .hero-ctas {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 40px;
        }
        .trust-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            color: var(--text-muted);
            font-size: 13px;
        }
        .trust-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        /* Feature cards */
        .features-section {
            padding: 80px 48px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section-title {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        .section-sub {
            text-align: center;
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 48px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        .feature-card {
            text-align: center;
            padding: 40px 32px;
        }
        .feature-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 20px;
        }
        .feature-icon-amber { background: var(--accent-amber-glow); }
        .feature-icon-blue { background: rgba(59, 130, 246, 0.15); }
        .feature-icon-green { background: rgba(34, 197, 94, 0.15); }
        .feature-card h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .feature-card .badge-free {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(34, 197, 94, 0.15);
            color: var(--color-high);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
            text-transform: uppercase;
        }
        .feature-card .badge-pro {
            display: inline-block;
            padding: 2px 8px;
            background: var(--accent-amber-glow);
            color: var(--accent-amber);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
            text-transform: uppercase;
        }
        .feature-card p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        /* How it works */
        .how-section {
            padding: 80px 48px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .steps-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            position: relative;
        }
        .step-card {
            text-align: center;
            padding: 32px 24px;
        }
        .step-number {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-amber-glow);
            border: 2px solid var(--accent-amber);
            color: var(--accent-amber);
            font-weight: 800;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .step-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .step-card p { color: var(--text-secondary); font-size: 14px; }

        /* Demo section */
        .demo-section {
            padding: 80px 48px;
            max-width: 900px;
            margin: 0 auto;
        }
        .demo-search-form {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        .demo-search-form .input { flex: 1; padding: 16px 20px; font-size: 16px; }
        .demo-results { display: flex; flex-direction: column; gap: 16px; }
        .demo-result-card {
            padding: 20px 24px;
        }
        .demo-result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .demo-para-badge {
            padding: 4px 10px;
            background: var(--accent-amber-glow);
            color: var(--accent-amber);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .demo-chapter { color: var(--text-muted); font-size: 13px; }
        .demo-similarity {
            margin-left: auto;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        .demo-result-text {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Pricing section */
        .pricing-section {
            padding: 80px 48px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            align-items: start;
        }
        .pricing-card {
            padding: 40px 32px;
            text-align: center;
            position: relative;
        }
        .pricing-card.popular {
            border-color: var(--accent-amber);
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.1);
        }
        .pricing-popular-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 16px;
            background: var(--accent-amber);
            color: #0a1628;
            font-size: 12px;
            font-weight: 700;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .pricing-tier {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .pricing-price {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 4px;
        }
        .pricing-price span { font-size: 16px; font-weight: 400; color: var(--text-muted); }
        .pricing-desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .pricing-features {
            list-style: none;
            text-align: left;
            margin-bottom: 32px;
        }
        .pricing-features li {
            padding: 8px 0;
            color: var(--text-secondary);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .pricing-features li::before {
            content: "\2713";
            color: var(--color-high);
            font-weight: 700;
            font-size: 14px;
        }
        .pricing-card .btn { width: 100%; }
        .pricing-coming-soon {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Footer */
        .landing-footer {
            padding: 40px 48px;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .footer-brand {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .footer-brand strong { color: var(--text-primary); }
        .footer-sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ========== AUTH PAGES ========== */
        .auth-page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }
        .auth-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
        }
        .auth-left-logo {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 48px;
        }
        .auth-left-logo span { color: var(--accent-amber); }
        .auth-left h2 {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 24px;
        }
        .auth-left p {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .auth-benefits {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-benefits li {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }
        .auth-benefit-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--accent-amber-glow);
            color: var(--accent-amber);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .auth-right {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }
        .auth-right h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .auth-right .auth-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-form .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .auth-form label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .auth-error {
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
            color: #ef4444;
            font-size: 13px;
        }
        .auth-footer-text {
            margin-top: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
        .auth-footer-text a { color: var(--accent-amber); font-weight: 500; cursor: pointer; }
        .auth-forgot {
            text-align: right;
            font-size: 13px;
        }
        .auth-forgot a { color: var(--text-muted); cursor: pointer; }
        .auth-forgot a:hover { color: var(--accent-amber); }

        /* ========== DASHBOARD LAYOUT (sidebar + main) ========== */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar-logo {
            padding: 0 20px 24px;
            font-size: 20px;
            font-weight: 800;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .sidebar-logo span { color: var(--accent-amber); }
        .sidebar-section {
            padding: 0 12px;
            margin-bottom: 24px;
        }
        .sidebar-section-label {
            padding: 0 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
        }
        .sidebar-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }
        .sidebar-item.active {
            background: var(--accent-amber-glow);
            color: var(--accent-amber);
        }
        .sidebar-item-icon {
            font-size: 18px;
            width: 22px;
            text-align: center;
        }
        .sidebar-spacer { flex: 1; }
        .sidebar-user {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-amber-glow);
            color: var(--accent-amber);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }
        .sidebar-user-info {
            flex: 1;
            min-width: 0;
        }
        .sidebar-user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-user-tier {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Main content area */
        .main-content {
            flex: 1;
            min-width: 0;
            padding: 32px 40px;
            overflow-y: auto;
        }
        .page-header {
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .page-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Dashboard cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            padding: 24px;
        }
        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-primary);
        }
        .stat-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .quick-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        /* ========== SEARCH PAGE ========== */
        .search-header {
            margin-bottom: 24px;
        }
        .search-form {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            position: relative;
        }
        .search-form .input { flex: 1; padding: 14px 20px; font-size: 15px; }
        .search-wrapper { flex: 1; position: relative; }
        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-top: 4px;
            z-index: 50;
            box-shadow: var(--shadow);
        }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ============================================================
        // CONSTANTS
        // ============================================================
        const SUGGESTIONS = [
            "DEMPE functions","arm's length principle","comparability analysis",
            "profit split method","TNMM","CUP method","cost plus method",
            "intangible property","location specific advantages","business restructuring",
            "financial guarantee","cash pooling","cost contribution arrangement",
            "safe harbour","advance pricing arrangement","corresponding adjustment",
            "marketing intangibles","trade intangibles","hard-to-value intangibles",
            "low value-adding services","management fees","risk allocation",
            "benchmarking study","comparable uncontrolled transaction","resale price method",
            "Berry ratio","residual profit split","HTVI","non-recognition",
            "permanent establishment","profit attribution","economic substance",
            "comparability adjustments","functional analysis","value chain analysis"
        ];

        const ADVISORY_EXAMPLES = [
            "How should I price a management fee from a UAE parent to an Indian subsidiary?",
            "What is the OECD approach to pricing financial guarantees?",
            "How do I apply DEMPE analysis to marketing intangibles developed by a local distributor?",
            "What are the documentation requirements for low value-adding intra-group services?",
            "How should business restructuring compensation be calculated when functions transfer to a principal company?"
        ];

        const EXAMPLE_QUERIES = [
            "DEMPE functions for marketing intangibles",
            "Location specific advantages in developing countries",
            "Financial guarantee fees arm's length",
            "Hard-to-value intangibles HTVI",
            "Low value-adding intra-group services",
            "Risk allocation in business restructurings"
        ];

        // ============================================================
        // HELPERS
        // ============================================================
        async function api(method, path, body) {
            const token = localStorage.getItem("tp_lab_token");
            const headers = { "Content-Type": "application/json" };
            if (token) headers["Authorization"] = `Bearer ${token}`;
            const opts = { method, headers };
            if (body && method !== "GET") opts.body = JSON.stringify(body);
            const res = await fetch(path, opts);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: res.statusText }));
                throw new Error(err.detail || `Error ${res.status}`);
            }
            return res.json();
        }

        function getAuth() {
            try {
                const token = localStorage.getItem("tp_lab_token");
                const user = JSON.parse(localStorage.getItem("tp_lab_user") || "null");
                return { token, user };
            } catch { return { token: null, user: null }; }
        }

        function setAuth(token, user) {
            if (token) localStorage.setItem("tp_lab_token", token);
            if (user) localStorage.setItem("tp_lab_user", JSON.stringify(user));
        }

        function clearAuth() {
            localStorage.removeItem("tp_lab_token");
            localStorage.removeItem("tp_lab_user");
        }

        function navigate(hash) {
            window.location.hash = hash;
        }

        function getSimilarityColor(score) {
            if (score >= 0.75) return "var(--color-high)";
            if (score >= 0.5) return "var(--color-med)";
            return "var(--color-low)";
        }

        function highlightText(text, searchQuery) {
            if (!searchQuery || !searchQuery.trim()) return text;
            const words = searchQuery.trim().split(/\s+/).filter(w => w.length > 1);
            if (!words.length) return text;
            const escaped = words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
            const pattern = new RegExp(`(${escaped.join("|")})`, "gi");
            const parts = text.split(pattern);
            return parts.map((part, i) =>
                pattern.test(part) ? React.createElement("mark", { key: i, className: "highlight" }, part) : part
            );
        }

        function renderMarkdown(md) {
            if (!md) return null;
            const lines = md.split("\n");
            const elements = [];
            let i = 0;
            while (i < lines.length) {
                const line = lines[i];
                if (line.startsWith("## ")) {
                    elements.push(React.createElement("h3", { key: i, className: "analysis-heading" }, line.slice(3)));
                } else if (line.startsWith("### ")) {
                    elements.push(React.createElement("h4", { key: i, className: "analysis-subheading" }, line.slice(4)));
                } else if (line.startsWith("- ") || line.startsWith("* ")) {
                    elements.push(React.createElement("li", { key: i, className: "analysis-li" }, line.slice(2)));
                } else if (line.trim() === "") {
                    elements.push(React.createElement("br", { key: i }));
                } else {
                    const parts = line.split(/(\*\*[^*]+\*\*)/g);
                    const rendered = parts.map((p, j) => {
                        if (p.startsWith("**") && p.endsWith("**")) {
                            return React.createElement("strong", { key: j }, p.slice(2, -2));
                        }
                        return p;
                    });
                    elements.push(React.createElement("p", { key: i, className: "analysis-p" }, ...rendered));
                }
                i++;
            }
            return elements;
        }

        function getCitationFormal(item) {
            const ref = item.para_ref ? `Para ${item.para_ref}` : `p. ${item.page}`;
            return `OECD (2022), Transfer Pricing Guidelines for Multinational Enterprises and Tax Administrations, ${ref}`;
        }

        function getCitationTP(item) {
            const ref = item.para_ref ? `paragraph ${item.para_ref}` : `p. ${item.page}`;
            const firstSentence = item.text.split(/[.!?]/)[0].trim().replace(/^\d{1,2}\.\d{1,3}\.?\s*/, "");

        function useToast() {
            const [toastMsg, setToastMsg] = useState(null);
            const show = useCallback((msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(null), 2000);
            }, []);
            return { toastMsg, show };
        }

        function useCopyToClipboard(showToast) {
            const [copiedState, setCopiedState] = useState(null);
            async function copyToClipboard(text, key) {
                try {
                    await navigator.clipboard.writeText(text);
                } catch {
                    const ta = document.createElement("textarea");
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand("copy");
                    document.body.removeChild(ta);
                }
                setCopiedState(key);
                showToast("Copied to clipboard!");
                setTimeout(() => setCopiedState(null), 2000);
            }
            return { copiedState, copyToClipboard };
        }

            const { copiedState, copyToClipboard } = useCopyToClipboard(showToast);
            const searchRef = useRef(null);

            useEffect(() => {
                fetch("/chapters").then(r => r.json()).then(d => {
                    setChapters(d.chapters || []);
                    setTotalParas(d.total || 0);
                }).catch(() => {});
                fetch("/analyze/status").then(r => r.json()).then(d => {
                    setAnalyzeEnabled(d.enabled);
                }).catch(() => {});
            }, []);

            function handleQueryChange(val) {
                setQuery(val);
                if (val.trim().length > 0) {
                    const lower = val.toLowerCase();
                    const matched = SUGGESTIONS.filter(s => s.toLowerCase().includes(lower)).slice(0, 5);
                    setSuggestions(matched);
                    setShowSuggestions(matched.length > 0);
                } else {
                    setShowSuggestions(false);
                }
            }

            async function handleSearch(e, overrideQuery) {
                if (e) e.preventDefault();
                const q = overrideQuery || query;
                if (!q.trim()) return;
                setQuery(q);
                setShowSuggestions(false);
                setLoading(true);
                setError(null);
                setSearched(true);
                setExpandedId(null);
                setDeepAnalysis(null);
                setShowDeepAnalysis(false);
                try {
                    let url = `/search?q=${encodeURIComponent(q.trim())}&n=10`;
                    if (selectedChapter) url += `&chapter=${encodeURIComponent(selectedChapter)}`;
                    const data = await api("GET", url);
                    setResults(data.results || []);
                    setElapsedMs(data.elapsed_ms || 0);
                } catch (err) {
                    setError(err.message);
                    setResults([]);
                } finally { setLoading(false); }
            }

            async function handleExpand(item) {
                const id = item.id;
                if (expandedId === id) { setExpandedId(null); return; }
                setExpandedId(id);
                if (!relatedMap[id]) {
                    setLoadingRelated(id);
                    try {
                        const data = await api("GET", `/related?id=${encodeURIComponent(id)}&n=3`);
                        setRelatedMap(prev => ({ ...prev, [id]: data.results || [] }));
                    } catch { setRelatedMap(prev => ({ ...prev, [id]: [] })); }
                    finally { setLoadingRelated(null); }
                }
            }

            async function handleAnalyze(item) {
                const id = item.id;
                if (analysisMap[id]) return;
                setLoadingAnalysis(id);
                try {
                    const data = await api("POST", "/analyze", {
                        query,
                        paragraphs: [{ id: item.para_ref || item.id, text: item.text, para_ref: item.para_ref }]
                    });
                    setAnalysisMap(prev => ({ ...prev, [id]: data.analysis }));
                } catch {
                    setAnalysisMap(prev => ({ ...prev, [id]: "ERROR: Analysis unavailable. Check API configuration." }));
                } finally { setLoadingAnalysis(null); }
            }

            async function handleDeepAnalysis() {
                if (loadingDeep || deepAnalysis) { setShowDeepAnalysis(!showDeepAnalysis); return; }
                setLoadingDeep(true);
                setShowDeepAnalysis(true);
                try {
                    const top5 = results.slice(0, 5).map(r => ({ id: r.para_ref || r.id, text: r.text, para_ref: r.para_ref }));
                    const data = await api("POST", "/analyze", { query, paragraphs: top5 });
                    setDeepAnalysis(data.analysis);
                } catch {
                    setDeepAnalysis("ERROR: Analysis unavailable. Check API configuration.");
                } finally { setLoadingDeep(false); }
            }

            function exportResults() {
                const lines = [`Query: ${query}`, ""];
                results.forEach(r => {
                    const ref = r.para_ref ? `Para ${r.para_ref}` : `Page ${r.page}`;
                    lines.push("---");
                    lines.push(`${ref} | ${r.chapter} | Page ${r.page}`);
                    lines.push(r.text);
                    lines.push("");
                });
                copyToClipboard(lines.join("\n"), "export-all");
            }

            function handleChapterClick(key) {
                const newChapter = key === selectedChapter ? "" : key;
                setSelectedChapter(newChapter);
                if (searched && query) {
                    let url = `/search?q=${encodeURIComponent(query.trim())}&n=10`;
                    if (newChapter) url += `&chapter=${encodeURIComponent(newChapter)}`;
                    api("GET", url).then(data => {
                        setResults(data.results || []);
                        setElapsedMs(data.elapsed_ms || 0);
                        setExpandedId(null);
                    }).catch(() => {});
                }
            }

            const highCount = results.filter(r => r.similarity >= 0.75).length;
            const medCount = results.filter(r => r.similarity >= 0.5 && r.similarity < 0.75).length;
            const lowCount = results.filter(r => r.similarity < 0.5).length;

            return (
                <AuthLayout activePage="search">
                    <div className="page-header">
                        <h1>Search OECD TP Guidelines</h1>
                        <p>Semantic search across {totalParas.toLocaleString()} paragraphs of the 2022 OECD Transfer Pricing Guidelines</p>
                    </div>

                    {/* Search form */}
                    <form className="search-form" onSubmit={handleSearch}>
                        <div className="search-wrapper">
                            <input
                                ref={searchRef}
                                className="input"
                                type="text"
                                value={query}
                                onChange={(e) => handleQueryChange(e.target.value)}
                                onFocus={() => { if (suggestions.length) setShowSuggestions(true); }}
                                onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
                                placeholder="Search the OECD Transfer Pricing Guidelines..."
                                autoFocus
                            />
                            {showSuggestions && (
                                <div className="suggestions-dropdown">
                                    {suggestions.map((s, i) => (
                                        <div key={i} className="suggestion-item" onMouseDown={() => handleSearch(null, s)}>{s}</div>
                                    ))}
                                </div>
                            )}
                        </div>
                        <button type="submit" className="btn btn-amber" disabled={loading}>
                            {loading ? "Searching..." : "Search"}
                        </button>
                    </form>

                    {/* Empty state */}
                    {!searched && !loading && (
                        <div className="empty-state">
                            <p className="empty-label">Try searching for:</p>
                            <div className="example-queries">
                                {EXAMPLE_QUERIES.map((eq, i) => (
                                    <button key={i} className="example-query" onClick={() => handleSearch(null, eq)}>{eq}</button>
                                ))}
                            </div>
                        </div>
                    )}

                    {error && <div className="error-msg"><strong>Error:</strong> {error}</div>}

                    {/* Results layout */}
                    {searched && !loading && (
                        <div className="search-layout">
                            {/* Chapter sidebar */}
                            <div className="search-chapters">
                                <div className="chapter-list">
                                    <div
                                        className={`chapter-item ${selectedChapter === "" ? "active" : ""}`}
                                        onClick={() => handleChapterClick("")}
                                    >
                                        <span>All Chapters</span>
                                        <span className="chapter-count">{totalParas}</span>
                                    </div>
                                    {chapters.map(ch => (
                                        <div
                                            key={ch.key}
                                            className={`chapter-item ${selectedChapter === ch.key ? "active" : ""}`}
                                            onClick={() => handleChapterClick(ch.key)}
                                        >
                                            <span>{ch.key.replace("Chapter ", "Ch. ")}</span>
                                            <span className="chapter-count">{ch.count}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Results area */}
                            <div className="search-results-area">
                                {results.length > 0 && (
                                    <React.Fragment>
                                        {/* Analytics bar */}
                                        <div className="analytics-bar">
                                            <div className="analytics-left">
                                                <span className="analytics-count">{results.length} results</span>
                                                <span className="analytics-time">{elapsedMs}ms</span>
                                                {selectedChapter && <span className="analytics-filter">{selectedChapter}</span>}
                                            </div>
                                            <div className="analytics-right">
                                                <span className="relevance-tag high">{highCount} high</span>
                                                <span className="relevance-tag med">{medCount} med</span>
                                                <span className="relevance-tag low">{lowCount} low</span>
                                            </div>
                                        </div>

                                        {/* Action bar */}
                                        <div className="action-bar">
                                            {analyzeEnabled && (
                                                <button className="btn btn-amber btn-sm" onClick={handleDeepAnalysis} disabled={loadingDeep}>
                                                    {loadingDeep ? "Generating..." : (deepAnalysis ? (showDeepAnalysis ? "Hide Deep Analysis" : "Show Deep Analysis") : "Deep Analysis")}
                                                </button>
                                            )}
                                            <button className="btn btn-outline btn-sm" onClick={exportResults}>
                                                {copiedState === "export-all" ? "Copied!" : "Export Results"}
                                            </button>
                                        </div>

                                        {/* Deep analysis panel */}
                                        {showDeepAnalysis && (deepAnalysis || loadingDeep) && (
                                            <React.Fragment>
                                            <p className="output-disclaimer">Research output — not professional advice. Verify independently before relying on any information.</p>
                                            <div className="analysis-panel deep-panel">
                                                <div className="analysis-panel-header">
                                                    <span className="analysis-panel-title">PhD-Level Deep Analysis</span>
                                                    {deepAnalysis && (
                                                        <button className="cite-btn cite-btn-sm" onClick={() => copyToClipboard(deepAnalysis, "copy-deep")}>
                                                            {copiedState === "copy-deep" ? "Copied!" : "Copy Analysis"}
                                                        </button>
                                                    )}
                                                </div>
                                                {loadingDeep && !deepAnalysis && (
                                                    <div className="analysis-loading"><div className="spinner"></div><span>Generating PhD-level analysis...</span></div>
                                                )}
                                                {deepAnalysis && <div className="analysis-content">{renderMarkdown(deepAnalysis)}</div>}
                                            </div>
                                            </React.Fragment>
                                        )}
                                    </React.Fragment>
                                )}

                                {results.length === 0 && !error && <p className="no-results">No results found for "{query}".</p>}

                                {/* Result cards */}
                                {results.map((r, i) => (
                                    <div key={r.id} className="card result-card" style={{ animationDelay: `${i * 50}ms` }}>
                                        <div className="result-header" onClick={() => handleExpand(r)}>
                                            <span className="result-rank">#{i + 1}</span>
                                            <span className="result-para-ref">{getParaLabel(r)}</span>
                                            <span className="result-meta">{r.chapter} &middot; Page {r.page}</span>
                                            <span className="similarity-badge" style={{ backgroundColor: getSimilarityColor(r.similarity) }}>
                                                {(r.similarity * 100).toFixed(1)}%
                                            </span>
                                            <span className="expand-icon">{expandedId === r.id ? "\u25B2" : "\u25BC"}</span>
                                        </div>
                                        <p className="result-text">{highlightText(r.text, query)}</p>

                                        {expandedId === r.id && (
                                            <div className="expanded-section">
                                                <div className="citation-buttons">
                                                    <button className="cite-btn" onClick={(e) => { e.stopPropagation(); copyToClipboard(getCitationFormal(r), `formal-${r.id}`); }}>
                                                        {copiedState === `formal-${r.id}` ? "Copied!" : "Copy Citation"}
                                                    </button>
                                                    <button className="cite-btn cite-btn-tp" onClick={(e) => { e.stopPropagation(); copyToClipboard(getCitationTP(r), `tp-${r.id}`); }}>
                                                        {copiedState === `tp-${r.id}` ? "Copied!" : "Copy for TP Report"}
                                                    </button>
                                                    {analyzeEnabled && (
                                                        <button
                                                            className="cite-btn cite-btn-analyze"
                                                            onClick={(e) => { e.stopPropagation(); handleAnalyze(r); }}
                                                            disabled={loadingAnalysis === r.id || !!analysisMap[r.id]}
                                                        >
                                                            {loadingAnalysis === r.id ? "Analyzing..." : (analysisMap[r.id] ? "Analysis Ready" : "Analyze")}
                                                        </button>
                                                    )}
                                                </div>

                                                <div className="citation-preview">
                                                    <div className="preview-block">
                                                        <span className="preview-label">Citation:</span>
                                                        <span className="preview-text">{getCitationFormal(r)}</span>
                                                    </div>
                                                    <div className="preview-block">
                                                        <span className="preview-label">TP Report:</span>
                                                        <span className="preview-text">{getCitationTP(r)}</span>
                                                    </div>
                                                </div>

                                                {/* Single paragraph analysis */}
                                                {(loadingAnalysis === r.id || analysisMap[r.id]) && (
                                                    <React.Fragment>
                                                    <p className="output-disclaimer">Research output — not professional advice. Verify independently before relying on any information.</p>
                                                    <div className="analysis-panel">
                                                        <div className="analysis-panel-header">
                                                            <span className="analysis-panel-title">PhD-Level Analysis</span>
                                                            {analysisMap[r.id] && (
                                                                <button className="cite-btn cite-btn-sm" onClick={() => copyToClipboard(analysisMap[r.id], `copy-analysis-${r.id}`)}>
                                                                    {copiedState === `copy-analysis-${r.id}` ? "Copied!" : "Copy Analysis"}
                                                                </button>
                                                            )}
                                                        </div>
                                                        {loadingAnalysis === r.id && !analysisMap[r.id] && (
                                                            <div className="analysis-loading"><div className="spinner"></div><span>Generating PhD-level analysis...</span></div>
                                                        )}
                                                        {analysisMap[r.id] && <div className="analysis-content">{renderMarkdown(analysisMap[r.id])}</div>}
                                                    </div>
                                                    </React.Fragment>
                                                )}

                                                {/* Related paragraphs */}
                                                <div className="related-section">
                                                    <h3 className="related-title">Related Paragraphs</h3>
                                                    {loadingRelated === r.id && <p className="related-loading">Finding related paragraphs...</p>}
                                                    {relatedMap[r.id] && relatedMap[r.id].length > 0 && (
                                                        <div className="related-list">
                                                            {relatedMap[r.id].map(rel => (
                                                                <div key={rel.id} className="related-card">
                                                                    <div className="related-header">
                                                                        <span className="related-ref">{rel.para_ref ? `Para ${rel.para_ref}` : `Page ${rel.page}`}</span>
                                                                        <span className="related-meta">{rel.chapter} &middot; Page {rel.page}</span>
                                                                        <span className="similarity-badge similarity-badge-sm" style={{backgroundColor: getSimilarityColor(rel.similarity)}}>
                                                                            {(rel.similarity * 100).toFixed(1)}%
                                                                        </span>
                                                                    </div>
                                                                    <p className="related-text">{highlightText(rel.text, query)}</p>
                                                                    <div className="related-actions">
                                                                        <button className="cite-btn cite-btn-sm" onClick={() => copyToClipboard(getCitationFormal(rel), `formal-${rel.id}`)}>
                                                                            {copiedState === `formal-${rel.id}` ? "Copied!" : "Copy Citation"}
                                                                        </button>
                                                                        <button className="cite-btn cite-btn-tp cite-btn-sm" onClick={() => copyToClipboard(getCitationTP(rel), `tp-${rel.id}`)}>
                                                                            {copiedState === `tp-${rel.id}` ? "Copied!" : "Copy for TP Report"}
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                    {relatedMap[r.id] && relatedMap[r.id].length === 0 && (
                                                        <p className="related-loading">No related paragraphs found.</p>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {toastMsg && <div className="toast">{toastMsg}</div>}
                </AuthLayout>
            );
        }

        // ============================================================
        // ADVISORY PAGE
        // ============================================================
        function AdvisoryPage() {
            const [question, setQuestion] = useState("");
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [showOecdRefs, setShowOecdRefs] = useState(false);
            const [showWebSources, setShowWebSources] = useState(false);

            const { toastMsg, show: showToast } = useToast();
            const { copiedState, copyToClipboard } = useCopyToClipboard(showToast);

            async function handleSubmit(e, overrideQ) {
                if (e) e.preventDefault();
                const q = overrideQ || question;
                if (!q.trim()) return;
                setQuestion(q);
                setLoading(true);
                setError(null);
                setResult(null);
                setShowOecdRefs(false);
                setShowWebSources(false);
                try {
                    const data = await api("POST", "/advisory", { question: q });
                    setResult(data);
                } catch (err) {
                    setError(err.message || "Research unavailable.");
                } finally { setLoading(false); }
            }

            return (
                <AuthLayout activePage="advisory">
                    <div className="page-header">
                        <h1>TP Research Intelligence</h1>
                        <p>Research complex transfer pricing questions and get comprehensive answers backed by OECD citations.</p>
                    </div>

                    <form className="advisory-form" onSubmit={handleSubmit}>
                        <textarea
                            className="input"
                            value={question}
                            onChange={(e) => setQuestion(e.target.value)}
                            placeholder="Research any transfer pricing question..."
                            rows={4}
                        />
                        <button type="submit" className="btn btn-amber" disabled={loading || !question.trim()} style={{marginTop:"12px"}}>
                            {loading ? "Researching..." : "Research This Question"}
                        </button>
                    </form>

                    {/* Example questions */}
                    {!result && !loading && !error && (
                        <div>
                            <p className="empty-label" style={{textAlign:"left", marginBottom:"12px"}}>Try asking:</p>
                            <div className="advisory-examples">
                                {ADVISORY_EXAMPLES.map((eq, i) => (
                                    <button key={i} className="advisory-example" onClick={() => handleSubmit(null, eq)}>{eq}</button>
                                ))}
                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className="advisory-loading-indicator">
                            <div className="advisory-pulse"></div>
                            <span>Researching your question across OECD Guidelines and recent developments...</span>

                        </div>
                    )}

                    {error && <div className="error-msg"><strong>Error:</strong> {error}</div>}

                    {result && (
                        <div className="advisory-response fade-in">
                            <p className="output-disclaimer">Research output — not professional advice. Verify independently before relying on any information.</p>
                            <div className="advisory-answer">
                                <div className="advisory-answer-header">
                                    <span className="advisory-answer-title">TP Research Response</span>
                                    <button className="cite-btn cite-btn-sm" onClick={() => copyToClipboard(result.answer, "copy-advisory")}>
                                        {copiedState === "copy-advisory" ? "Copied!" : "Copy Response"}
                                    </button>
                                </div>
                                <div className="analysis-content">{renderMarkdown(result.answer)}</div>
                            </div>

                            {result.oecd_references && result.oecd_references.length > 0 && (
                                <React.Fragment>
                                    <div className="advisory-collapsible" onClick={() => setShowOecdRefs(!showOecdRefs)}>
                                        <span className="advisory-collapsible-title">OECD References ({result.oecd_references.length})</span>
                                        <span className="expand-icon">{showOecdRefs ? "\u25B2" : "\u25BC"}</span>
                                    </div>
                                    {showOecdRefs && (
                                        <div className="advisory-refs-list">
                                            {result.oecd_references.map((ref, i) => (
                                                <div key={i} className="related-card">
                                                    <div className="related-header">
                                                        <span className="related-ref">{ref.para_ref ? `Para ${ref.para_ref}` : `Page ${ref.page}`}</span>
                                                        <span className="related-meta">{ref.chapter} &middot; Page {ref.page}</span>
                                                        <span className="similarity-badge similarity-badge-sm" style={{backgroundColor: getSimilarityColor(ref.relevance_score)}}>
                                                            {(ref.relevance_score * 100).toFixed(1)}%
                                                        </span>
                                                    </div>
                                                    <p className="related-text">{ref.text}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </React.Fragment>
                            )}

                            {result.web_sources && result.web_sources.length > 0 && (
                                <React.Fragment>
                                    <div className="advisory-collapsible" onClick={() => setShowWebSources(!showWebSources)}>
                                        <span className="advisory-collapsible-title">Web Sources ({result.web_sources.length})</span>
                                        <span className="expand-icon">{showWebSources ? "\u25B2" : "\u25BC"}</span>
                                    </div>
                                    {showWebSources && (
                                        <div className="advisory-refs-list">
                                            {result.web_sources.map((src, i) => (
                                                <div key={i} className="web-source-card">
                                                    <a href={src.url} target="_blank" rel="noopener noreferrer" className="web-source-title">{src.title || src.url}</a>
                                                    {src.snippet && <p className="web-source-snippet">{src.snippet}</p>}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </React.Fragment>
                            )}
                        </div>
                    )}

                    {toastMsg && <div className="toast">{toastMsg}</div>}
                </AuthLayout>
            );
        }

                            <a href="#/signup" className="btn btn-amber btn-sm">Get Started</a>
                        </div>
                    </nav>
                    {content}
                    <div className="disclaimer-bar">
                        <p>TP Lab is a research tool. Nothing on this platform constitutes professional tax advice, legal advice, or a recommendation to take any specific action. Users should consult qualified tax professionals for advice specific to their circumstances.</p>
                    </div>
                    <footer className="landing-footer">
                        <p className="footer-brand"><strong>TP Lab</strong> — An Averise Advisors Product</p>
                        <p className="footer-sub"><a href="#/disclaimer">Disclaimer</a> &middot; Privacy Policy &middot; Terms of Service</p>
                        <p className="footer-sub">&copy; 2026 Averise Advisors. All rights reserved.</p>
                    </footer>
                </div>
            );
        }

        // ============================================================
        // APP (router)
        // ============================================================
        function App() {
            const [route, setRoute] = useState(window.location.hash || "#/");

            useEffect(() => {
                function onHash() { setRoute(window.location.hash || "#/"); }
                window.addEventListener("hashchange", onHash);
                return () => window.removeEventListener("hashchange", onHash);
            }, []);

            // Auth guard
            function requireAuth(Component) {
                const { token } = getAuth();
                if (!token) {
                    navigate("/login");
                    return null;
                }
                return React.createElement(Component);
            }

            const path = route.replace("#", "") || "/";

            switch (path) {
                case "/":
                    return React.createElement(LandingPage);
                case "/login":
                    return React.createElement(LoginPage);
                case "/signup":
                    return React.createElement(SignupPage);
                case "/dashboard":
                    return requireAuth(DashboardPage);
                case "/search":
                    return requireAuth(SearchPage);
                case "/advisory":
                    return requireAuth(AdvisoryPage);
                case "/pricing":
                    return React.createElement(PricingPage);
                case "/disclaimer":
                    return React.createElement(DisclaimerPage);
                default:
                    return React.createElement(LandingPage);
            }
        }

        // ============================================================
        // MOUNT
        // ============================================================
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(App));
    </script>
</body>
</html>
